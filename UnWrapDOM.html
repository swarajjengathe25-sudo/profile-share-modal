<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="w-[100vw] h-[100vh] flex flex-col items-center justify-center bg-[#344151] gap-10">

    <div class="text-[#3d98f4] font-medium text-[20px]">
        Increment and Decrement
    </div>

    <div class="bg-white flex text-[25px] text-[#344151] rounded-sm gap-12 p-3 px-5 items-center">

        <!-- Minus -->
        <button onclick="decrement()" class="border-r-2 border-[#bfbfbf] pr-5">
            <i class="fa-solid fa-minus"></i>
        </button>

        <!-- Value -->
        <div id="counter" class="font-bold">
            0
        </div>

        <!-- Plus -->
        <button onclick="increment()" class="border-l-2 border-[#bfbfbf] pl-5">
            <i class="fa-solid fa-plus"></i>
        </button>

    </div>

</div>

<script src="8.UnWrapDOM.js"></script>

</body>
</html>
